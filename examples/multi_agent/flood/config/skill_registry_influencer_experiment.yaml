# Phase 6T-F.5 influencer-experiment skill registry (AUTO-COMPOSED, NOT paper-3).
# = frozen skill_registry.yaml (household/gov/insurance skills) + the 4 influencer
# post-skills from skill_registry_influencer.yaml. frozen file NOT modified.
default_skill: do_nothing
skills:
- skill_id: do_nothing
  description: Take no protective action this year. This includes waiting for more information, believing current protection is adequate, focusing on other financial priorities, feeling uncertain about what to do, or accepting the situation as it is.
  eligible_agent_types:
  - household_owner
  - household_renter
  preconditions: []
  institutional_constraints: {}
  allowed_state_changes: []
  implementation_mapping: noop
- skill_id: buy_insurance
  description: Purchase NFIP flood insurance (annual, renewable)
  eligible_agent_types:
  - household_owner
  preconditions: []
  institutional_constraints:
    annual: true
    cost_type: recurring
  allowed_state_changes:
  - has_insurance
  implementation_mapping: buy_insurance
- skill_id: elevate_house
  description: Elevate house structure (3ft=$45K, 5ft=$80K, 8ft=$150K before subsidy)
  eligible_agent_types:
  - household_owner
  preconditions:
  - not elevated
  institutional_constraints:
    once_only: true
    cost_type: one_time
  allowed_state_changes:
  - elevated
  implementation_mapping: elevate_house
  conflicts_with:
  - buyout_program
- skill_id: buyout_program
  description: Accept NJ Blue Acres voluntary buyout (irreversible)
  eligible_agent_types:
  - household_owner
  preconditions:
  - not relocated
  institutional_constraints:
    once_only: true
    permanent: true
    cost_type: one_time
  allowed_state_changes:
  - bought_out
  implementation_mapping: buyout_program
  conflicts_with:
  - elevate_house
  - buy_insurance
- skill_id: buy_contents_insurance
  description: Purchase NFIP contents-only flood insurance (annual)
  eligible_agent_types:
  - household_renter
  preconditions: []
  institutional_constraints:
    annual: true
    cost_type: recurring
  allowed_state_changes:
  - has_contents_insurance
  implementation_mapping: buy_contents_insurance
- skill_id: relocate
  description: Relocate to lower flood-risk area (irreversible)
  eligible_agent_types:
  - household_renter
  preconditions:
  - not relocated
  institutional_constraints:
    once_only: true
    permanent: true
    cost_type: one_time
  allowed_state_changes:
  - relocated
  implementation_mapping: relocate
  conflicts_with:
  - buy_contents_insurance
