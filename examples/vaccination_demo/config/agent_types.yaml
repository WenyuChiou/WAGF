# Vaccination Decision-Making — Agent Types Configuration
# WAGF non-water reference example. Demonstrates the Health Belief Model
# (HBM; Rosenstock 1974; Carpenter 2010) as an alternative cognitive
# framework to PMT.
#
# Phase 6C-v3 reference: every block here is consumed by stock broker
# config loaders without any domain-specific branch. The
# `psychological_framework: hbm` line triggers ThinkingValidator
# framework resolution at runtime — HBM must be pre-registered via
# `register_framework_metadata("hbm", ...)` in
# examples/vaccination_demo/cognition/__init__.py (Phase 6C-v3 Group H
# strict registration check).

global_config:
  memory:
    window_size: 5
    consolidation_threshold: 0.6
    consolidation_probability: 0.7
    top_k_significant: 2
    decay_rate: 0.1

  reflection:
    interval: 1
    batch_size: 5
    importance_boost: 0.85
    persona_instruction: "Summarize each agent's vaccination journey into a 2-sentence 'Lesson Learned'. Speak in FIRST PERSON (e.g., 'I realized...') and reflect the agent's HBM appraisals."
    questions:
      - "Has your perceived susceptibility to infection changed this year?"
      - "Did the perceived benefits of vaccination outweigh the barriers you experienced?"
      - "What information or events would have changed your decision?"
    triggers:
      crisis: true                     # Triggered by outbreak event
      periodic_interval: 2             # Every 2 years
      decision_types:
        - get_vaccinated
        - refuse
      institutional_threshold: 0.05
    method: hybrid

  llm:
    model: "command-line-override"
    num_ctx: 4096
    num_predict: 1024
    max_retries: 2

  governance:
    max_retries: 3
    max_reports_per_retry: 3
    domain: vaccination

  # --- Vaccination environment parameters ---
  vaccination_system:
    simulation_start: 2024
    vaccine_supply_default: 1000     # doses per year
    outbreak_schedule:
      - { year: 2, severity: 0.6 }   # Year 2 moderate outbreak
    side_effect_base_rate: 0.02      # 2% nuisance side-effects

# =============================================================================
# SHARED DEFINITIONS
# =============================================================================
shared:
  rating_scale: |
    ### RATING SCALE (You MUST use EXACTLY one of these codes):
    VL = Very Low | L = Low | M = Medium | H = High | VH = Very High

  response_format:
    delimiter_start: "<<<DECISION_START>>>"
    delimiter_end: "<<<DECISION_END>>>"
    fields:
      # HBM 8-field schema (L3-1B 2026-05-23 expansion — was 4-field per
      # Phase 6C-v4 cycle 4 gemma3:4b stable parse limit; raised to 8
      # because the L3-1A scope upgrades the default model to gemma3:4b
      # for production runs and uses gemma3:1b only for fast smoke. If
      # gemma3:1b parse-failure rate spikes, fall back to the 4-field
      # schema for that model by overriding via --num-predict or a
      # model-specific config; the construct list expansion in
      # ``cognition/hbm_framework.py`` does NOT depend on all 6 being
      # parsed every call — partial extraction is acceptable and shows
      # up in the audit CSV's ``construct_completeness`` column).
      # These fields are auto-rendered into the prompt via the
      # broker-filled {response_format} placeholder (see
      # broker/components/response_format.py:ResponseFormatBuilder.build).
      # DO NOT hand-write a JSON example in the prompt template — let
      # the broker derive it from this list so YAML and prompt stay in
      # sync.
      - { key: "reasoning", type: "text", required: true, description: "Explain your thought process in 2-3 sentences BEFORE choosing." }
      - {
          key: "susceptibility_assessment",
          type: "appraisal",
          required: true,
          construct: "SUSCEPTIBILITY_LABEL",
          reason_hint: "One sentence on how likely you feel to be infected.",
        }
      # L3-1B (2026-05-23, post-reviewer): severity / benefits / barriers
      # are ``required: true`` — they're 3 of Carpenter 2010's 5 primary
      # predictors and the smoke #3 run with explicit TieredContextBuilder
      # showed gemma3:1b emits all 6 reliably when the JSON schema example
      # is injected via ``{response_format}``. Only cues_to_action stays
      # ``required: false`` — Carpenter ranks it 5th (OR 1.73, weakest of
      # the original 5) and reports it less consistently in primary
      # studies. The audit ``construct_completeness`` column shows how
      # many of the 6 were actually emitted per call. If a future smaller
      # model breaks parse reliability, flip severity/benefits/barriers
      # back to required: false as the fallback.
      - {
          key: "severity_assessment",
          type: "appraisal",
          required: true,
          construct: "SEVERITY_LABEL",
          reason_hint: "One sentence on how bad infection would be for your household.",
        }
      - {
          key: "benefits_assessment",
          type: "appraisal",
          required: true,
          construct: "BENEFITS_LABEL",
          reason_hint: "One sentence on how much vaccination would protect you.",
        }
      - {
          key: "barriers_assessment",
          type: "appraisal",
          required: true,
          construct: "BARRIERS_LABEL",
          reason_hint: "One sentence on the cost / time / side-effect / trust concerns you face.",
        }
      - {
          key: "self_efficacy_assessment",
          type: "appraisal",
          required: true,
          construct: "SELF_EFFICACY_LABEL",
          reason_hint: "One sentence on your confidence to seek and complete vaccination.",
        }
      - {
          key: "cues_to_action_assessment",
          type: "appraisal",
          required: false,
          construct: "CUES_TO_ACTION_LABEL",
          reason_hint: "One sentence on whether external signals (outbreak news, doctor / family advice) are nudging you.",
        }
      - {
          key: "decision",
          type: "choice",
          required: true,
          description: "Numeric ID, choose ONE from: 1, 2, or 3 (1=get_vaccinated, 2=delay, 3=refuse)",
        }

# =============================================================================
# INDIVIDUAL — vaccination decision-maker
# =============================================================================
individual:
  agent_type: individual
  psychological_framework: hbm
  prompt_template_file: prompts/individual.txt
  inherit_shared: true

  # ---------------------------------------------------------------------------
  # Action declarations — REQUIRED so parser.get_valid_actions("individual")
  # returns non-empty. Without this block the LLM output is silently
  # rejected because no skill name matches an empty allowlist (Phase 6C-v4
  # Finding 5 root cause discovered 2026-05-10).
  # ---------------------------------------------------------------------------
  actions:
    - id: get_vaccinated
      aliases: ["1", "get_vaccinated", "vaccinate", "[get_vaccinated]"]
      description: >
        Receive a single dose of the seasonal vaccine this year.
    - id: delay
      aliases: ["2", "delay", "wait", "postpone", "[delay]"]
      description: >
        Postpone the decision; reconsider next year after observing
        more information.
    - id: refuse
      aliases: ["3", "refuse", "decline", "skip", "[refuse]"]
      description: >
        Decline vaccination this year.

  # Construct overrides (HBM-specific labels).
  # L3-1B (2026-05-23): expanded from 2 to 6 constructs. Primary set =
  # the five direct predictors per Carpenter (2010); CUES_TO_ACTION is
  # the secondary contextual signal. Match `cognition/hbm_framework.py`
  # exactly — divergence between this YAML and the Python registry
  # would silently degrade the ThinkingValidator.
  constructs:
    primary:
      ["SUSCEPTIBILITY_LABEL", "SEVERITY_LABEL", "BENEFITS_LABEL",
       "BARRIERS_LABEL", "SELF_EFFICACY_LABEL"]
    secondary: ["CUES_TO_ACTION_LABEL"]
    all:
      ["SUSCEPTIBILITY_LABEL", "SEVERITY_LABEL", "BENEFITS_LABEL",
       "BARRIERS_LABEL", "SELF_EFFICACY_LABEL", "CUES_TO_ACTION_LABEL"]

  # ---------------------------------------------------------------------------
  # Parsing config — REQUIRED to extract HBM constructs from LLM JSON.
  # Each construct (SUSCEPTIBILITY_LABEL, SELF_EFFICACY_LABEL) maps to its
  # JSON key in the LLM response + a regex for the label value. Without
  # this block the parser cannot extract appraisal labels and the agent
  # validator rejects every response (Phase 6C-v4 Finding 5 secondary
  # root cause).
  # ---------------------------------------------------------------------------
  parsing:
    decision_keywords: ["decision", "choice", "action", "selected_action"]
    default_skill: "delay"
    strict_mode: true
    preprocessor:
      { type: "smart_repair", quote_values: ["VL", "L", "M", "H", "VH"] }
    proximity_window: 35
    constructs:
      SUSCEPTIBILITY_LABEL:
        keywords: ["susceptibility_assessment", "perceived_susceptibility", "susceptibility"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      SUSCEPTIBILITY_REASON:
        keywords: ["susceptibility_assessment", "perceived_susceptibility", "susceptibility"]
        regex: ".*"
      SEVERITY_LABEL:
        keywords: ["severity_assessment", "perceived_severity", "severity"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      SEVERITY_REASON:
        keywords: ["severity_assessment", "perceived_severity", "severity"]
        regex: ".*"
      BENEFITS_LABEL:
        keywords: ["benefits_assessment", "perceived_benefits", "benefits"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      BENEFITS_REASON:
        keywords: ["benefits_assessment", "perceived_benefits", "benefits"]
        regex: ".*"
      BARRIERS_LABEL:
        keywords: ["barriers_assessment", "perceived_barriers", "barriers"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      BARRIERS_REASON:
        keywords: ["barriers_assessment", "perceived_barriers", "barriers"]
        regex: ".*"
      SELF_EFFICACY_LABEL:
        keywords: ["self_efficacy_assessment", "perceived_self_efficacy", "self_efficacy"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      SELF_EFFICACY_REASON:
        keywords: ["self_efficacy_assessment", "perceived_self_efficacy", "self_efficacy"]
        regex: ".*"
      CUES_TO_ACTION_LABEL:
        keywords: ["cues_to_action_assessment", "perceived_cues", "cues_to_action", "cues"]
        regex: "(?i)\\b(VL|L|M|H|VH)\\b"
      CUES_TO_ACTION_REASON:
        keywords: ["cues_to_action_assessment", "perceived_cues", "cues_to_action", "cues"]
        regex: ".*"

  log_fields:
    # L3-1B (2026-05-23): track all 6 HBM appraisal assessments so the
    # audit label column shows the full construct extraction, not just the
    # 2 that the original PoC tracked.
    ["susceptibility_assessment", "severity_assessment", "benefits_assessment",
     "barriers_assessment", "self_efficacy_assessment", "cues_to_action_assessment"]

  # Domain-specific YAML validator rules (Tier 2 thinking validators).
  # These ride alongside the Python check functions in
  # examples/vaccination_demo/validators/vaccination_validators.py.
  rules:
    - id: high_susceptibility_high_efficacy_no_refuse
      level: ERROR
      blocked_skills: [refuse]
      conditions:
        - { type: construct, field: SUSCEPTIBILITY_LABEL, operator: "in", values: ["H", "VH"] }
        - { type: construct, field: SELF_EFFICACY_LABEL, operator: "in", values: ["H", "VH"] }
      message: "HBM coherence: high perceived susceptibility plus high self-efficacy should not lead to refusal."
    - id: low_susceptibility_no_get_vaccinated
      level: WARNING
      blocked_skills: [get_vaccinated]
      conditions:
        - { type: construct, field: SUSCEPTIBILITY_LABEL, operator: "in", values: ["VL"] }
      message: "HBM coherence: very low perceived susceptibility plus immediate vaccination is unusual — worth reflecting on motive."
