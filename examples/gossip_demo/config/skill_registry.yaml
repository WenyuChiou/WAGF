# Skill registry for gossip_demo (Phase 6F).
# Three agent types × 4 skills each = 12 skills.
# Pattern reused from vaccination_ma_demo (3 types, broadcast comm).
#
# Domain story: simulation of a community / neighborhood social-media
# environment (think NextDoor or Facebook neighborhood groups), where
# users see posts from spatially-nearby neighbors. Influencers post,
# casual users react, the platform moderator may amplify or demote.

domain: gossip
default_skill: ignore   # casual_user fallback; other types have own defaults

skills:
  # --- influencer (creates content) ---------------------------------
  - skill_id: post_neutral
    domain: gossip
    description: Publish a routine post — community update, observation, low-engagement-bait.
    eligible_agent_types: ["influencer"]
  - skill_id: post_polarizing
    domain: gossip
    description: Publish a polarizing or attention-seeking post. Higher engagement, higher moderation risk.
    eligible_agent_types: ["influencer"]
  - skill_id: share_trending
    domain: gossip
    description: Re-share the current trending post to your audience. Amplifies platform consensus.
    eligible_agent_types: ["influencer"]
  - skill_id: stay_silent
    domain: gossip
    description: Post nothing this cycle. Conserves reputation; no engagement signal.
    eligible_agent_types: ["influencer"]

  # --- casual_user (reacts to content) ------------------------------
  - skill_id: share
    domain: gossip
    description: Share / re-post a visible post from a neighbor to your own audience.
    eligible_agent_types: ["casual_user"]
  - skill_id: like
    domain: gossip
    description: Engage positively (like / endorse) a visible neighbor post.
    eligible_agent_types: ["casual_user"]
  - skill_id: ignore
    domain: gossip
    description: Skip engagement this cycle. Default fallback.
    eligible_agent_types: ["casual_user"]
  - skill_id: report
    domain: gossip
    description: Flag a visible post as inappropriate to the platform moderator.
    eligible_agent_types: ["casual_user"]

  # --- platform_moderator (controls platform signal) -----------------
  - skill_id: boost_signal
    domain: gossip
    description: Algorithmically boost a community-approved trending topic.
    eligible_agent_types: ["platform_moderator"]
  - skill_id: demote_misinfo
    domain: gossip
    description: Demote a post / topic flagged via reports as misinformation.
    eligible_agent_types: ["platform_moderator"]
  - skill_id: warn_community
    domain: gossip
    description: Issue a moderation advisory visible to all users (community guidelines reminder).
    eligible_agent_types: ["platform_moderator"]
  - skill_id: do_nothing
    domain: gossip
    description: No moderation action this cycle.
    eligible_agent_types: ["platform_moderator"]
